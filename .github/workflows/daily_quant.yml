name: Daily Quant AI Report

on:
  schedule:
    # 매일 한국 시간 오전 8시 (UTC 23:00)
    - cron: '0 23 * * *'
  workflow_dispatch: # Actions 탭에서 수동으로 "Run workflow" 버튼 실행 가능

jobs:
  run-daily-report:
    runs-on: ubuntu-latest
    
    steps:
    - name: 저장소 체크아웃 (Checkout Repository)
      uses: actions/checkout@v3

    - name: 파이썬 3.10 환경 세팅 (Set up Python)
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 의존성 패키지 설치 (Install dependencies)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 1. 퀀트 분석 엔진 구동 (Data Collection, Analysis, DB Save)
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        DART_API_KEY: ${{ secrets.DART_API_KEY }}
        CUSTOMS_API_KEY: ${{ secrets.CUSTOMS_API_KEY }}
        BOK_API_KEY: ${{ secrets.BOK_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      run: python quant_engine.py
      
    - name: 2. 노션 리포터 전송 (Dashboard Generation)
      env:
        NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      run: python -m auto_trading.notion_reporter

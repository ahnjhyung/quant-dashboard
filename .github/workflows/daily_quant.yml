name: Daily Quant Report Scheduler

on:
  schedule:
    # 23:30 UTC = 한국 시간(KST) 오전 08:30 (데일리 리포트)
    - cron: '30 23 * * 1-5'
    # 매 시간 정각 (인트라데이 감시)
    - cron: '0 * * * 1-5'
  workflow_dispatch:           # GitHub 사이트에서 수동 실행 가능

jobs:
  run-quant-engine:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Quant Engine
      env:
        # GitHub Secrets 보호 처리를 통해 키 노출 방지
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        DART_API_KEY: ${{ secrets.DART_API_KEY }}
        CUSTOMS_API_KEY: ${{ secrets.CUSTOMS_API_KEY }}
        CUSTOMS_API_ENDPOINT: "https://apis.data.go.kr/1220000/nitemtrade"
        UN_COMTRADE_API_KEY: ${{ secrets.UN_COMTRADE_API_KEY }}
        NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        PYTHONPATH: ${{ github.workspace }}
      run: |
        python quant_engine.py

    - name: Send Daily Email Report
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        DART_API_KEY: ${{ secrets.DART_API_KEY }}
        CUSTOMS_API_KEY: ${{ secrets.CUSTOMS_API_KEY }}
        CUSTOMS_API_ENDPOINT: "https://apis.data.go.kr/1220000/nitemtrade"
        UN_COMTRADE_API_KEY: ${{ secrets.UN_COMTRADE_API_KEY }}
        NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        # ── 이메일 발송용 ──────────────────────────────────────────
        SMTP_HOST: smtp.gmail.com
        SMTP_PORT: "587"
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASS: ${{ secrets.SMTP_PASS }}
        RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        PYTHONPATH: ${{ github.workspace }}
      run: |
        python auto_trading/email_reporter.py
        echo "✅ Daily email report sent at $(TZ='Asia/Seoul' date)"

  intraday-monitor:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 * * * 1-5' || github.event_name == 'workflow_dispatch'
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Intraday Monitor
      env:
        # 주요 API 키 및 SMTP 설정
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        SMTP_HOST: smtp.gmail.com
        SMTP_PORT: "587"
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASS: ${{ secrets.SMTP_PASS }}
        RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        PYTHONPATH: ${{ github.workspace }}
      run: |
        python auto_trading/intraday_monitor.py
        echo "✅ Intraday scan completed at $(TZ='Asia/Seoul' date)"

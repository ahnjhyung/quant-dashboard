name: Quant Engine CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Test configuration and syntax
      run: |
        # config.py 임포트를 통해 문법 에러 및 기본 모듈 의존성 검사
        python -c "import config"
        echo "✅ Syntax and imports verified successfully."
